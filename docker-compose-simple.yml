version: '3.8'

services:
  pco-mcp:
    image: ghcr.io/chilimac02/PCO-MCP-v1.1:latest
    ports:
      - "9000:9000"
    environment:
      - PCO_APP_ID=<YOUR_APP_ID_HERE>
      - PCO_SECRET=<YOUR_SECRET_HERE>
      - PORT=9000
      - LOG_LEVEL=info
    volumes:
      - ./app:/app/app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    labels:
      - "app=PCO-MCP-Server"
      - "env=production"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
